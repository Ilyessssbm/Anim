name: Build Plugin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew make

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: ./*.cs3
